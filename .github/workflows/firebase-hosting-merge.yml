# This file was created to auto-deploy to Firebase Hosting on push to main branch
name: Deploy to Firebase Hosting on Merge

on:
  push:
    branches:
      - main

permissions:
  checks: write
  contents: read
  deployments: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_GERMAN_BUILDER }}
          projectId: my-german-builder
          target: dailydeutsch
